# Wayline reverse proxy — same-origin routing.
#
# One origin (port 80) fronts both the Next.js frontend and the Express
# api-gateway, so the browser never needs CORS or a second exposed port.
#
# Path routing (nginx picks the longest matching prefix):
#   /api/auth/   -> frontend  (NextAuth lives here)
#   /api/        -> api-gateway (route, geocode, reverse-geocode, roads)
#   /auth/       -> api-gateway (login, register)
#   /            -> frontend (pages, static assets, _next)
#
# Service names resolve via Docker's internal DNS on the compose network.

upstream wayline_frontend {
    server frontend:3000;
}

upstream wayline_api {
    server api-gateway:3000;
}

server {
    listen 80;
    server_name _;

    # Allow large-ish payloads (GeoJSON responses, etc.)
    client_max_body_size 10m;

    # --- NextAuth stays on the frontend ---
    location /api/auth/ {
        proxy_pass http://wayline_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- api-gateway: data endpoints under /api/ ---
    location /api/ {
        proxy_pass http://wayline_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- api-gateway: auth endpoints under /auth/ ---
    location /auth/ {
        proxy_pass http://wayline_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Everything else: the Next.js frontend ---
    location / {
        proxy_pass http://wayline_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
